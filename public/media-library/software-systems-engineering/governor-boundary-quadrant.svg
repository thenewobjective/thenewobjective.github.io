<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" width="100%" height="auto" role="img" aria-labelledby="quad-title quad-desc">
  <title id="quad-title">The boundary of the virtual governor concept, as a two-condition quadrant</title>
  <desc id="quad-desc">A quadrant diagram with two axes: whether any single component holds the attractor, and whether the system actually converges cleanly to it. DNS satisfies convergence but fails the no-single-holder condition. BGP satisfies decentralization but never converges cleanly. Raft, CRDTs, Kubernetes, and Bitcoin satisfy both and are genuine virtual governors.</desc>

  <defs>
    <marker id="quad-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>

  <g font-family="sans-serif" color="#333">

    <!-- Axes -->
    <line x1="80" y1="400" x2="80" y2="40" stroke="currentColor" stroke-width="2" marker-end="url(#quad-arrow)" fill="none"/>
    <line x1="80" y1="400" x2="580" y2="400" stroke="currentColor" stroke-width="2" marker-end="url(#quad-arrow)" fill="none"/>

    <!-- Axis labels -->
    <text x="330" y="440" text-anchor="middle" fill="currentColor" stroke="none" font-size="14" font-weight="bold">converges cleanly to the attractor</text>
    <text x="40" y="220" text-anchor="middle" fill="currentColor" stroke="none" font-size="14" font-weight="bold" transform="rotate(-90 40 220)">no single component holds it</text>

    <!-- Axis end labels -->
    <text x="120" y="418" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">no</text>
    <text x="555" y="418" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">yes</text>
    <text x="65" y="385" text-anchor="end" fill="currentColor" stroke="none" font-size="12">no</text>
    <text x="65" y="55" text-anchor="end" fill="currentColor" stroke="none" font-size="12">yes</text>

    <!-- Quadrant divider (subtle) -->
    <line x1="330" y1="400" x2="330" y2="40" stroke="currentColor" stroke-width="1" stroke-dasharray="3,4" opacity="0.35" fill="none"/>
    <line x1="80" y1="220" x2="580" y2="220" stroke="currentColor" stroke-width="1" stroke-dasharray="3,4" opacity="0.35" fill="none"/>

    <!-- Top-right quadrant: genuine virtual governors -->
    <rect x="335" y="45" width="240" height="170" rx="10" fill="#2e7d32" opacity="0.08" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="455" y="68" text-anchor="middle" fill="#2e7d32" stroke="none" font-size="13" font-weight="bold">genuine virtual governors</text>
    <text x="455" y="95" text-anchor="middle" fill="#2e7d32" stroke="none" font-size="12">Raft</text>
    <text x="455" y="118" text-anchor="middle" fill="#2e7d32" stroke="none" font-size="12">CRDTs</text>
    <text x="455" y="141" text-anchor="middle" fill="#2e7d32" stroke="none" font-size="12">Kubernetes</text>
    <text x="455" y="164" text-anchor="middle" fill="#2e7d32" stroke="none" font-size="12">Bitcoin</text>

    <!-- Top-left quadrant: BGP -->
    <rect x="85" y="45" width="240" height="170" rx="10" fill="#8a3b1b" opacity="0.08" stroke="#8a3b1b" stroke-width="1.5"/>
    <text x="205" y="68" text-anchor="middle" fill="#8a3b1b" stroke="none" font-size="13" font-weight="bold">decentralized, never settles</text>
    <text x="205" y="100" text-anchor="middle" fill="#8a3b1b" stroke="none" font-size="12">BGP</text>
    <text x="205" y="122" text-anchor="middle" fill="#8a3b1b" stroke="none" font-size="11" font-style="italic">policy, peering, and</text>
    <text x="205" y="140" text-anchor="middle" fill="#8a3b1b" stroke="none" font-size="11" font-style="italic">self-interest distort it</text>

    <!-- Bottom-right quadrant: DNS -->
    <rect x="335" y="225" width="240" height="170" rx="10" fill="#8a3b1b" opacity="0.08" stroke="#8a3b1b" stroke-width="1.5"/>
    <text x="455" y="248" text-anchor="middle" fill="#8a3b1b" stroke="none" font-size="13" font-weight="bold">centralized, wearing a costume</text>
    <text x="455" y="280" text-anchor="middle" fill="#8a3b1b" stroke="none" font-size="12">DNS</text>
    <text x="455" y="302" text-anchor="middle" fill="#8a3b1b" stroke="none" font-size="11" font-style="italic">the root zone is signed</text>
    <text x="455" y="320" text-anchor="middle" fill="#8a3b1b" stroke="none" font-size="11" font-style="italic">and published by a named few</text>

    <!-- Bottom-left quadrant: empty -->
    <rect x="85" y="225" width="240" height="170" rx="10" fill="currentColor" opacity="0.04" stroke="currentColor" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="205" y="315" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-style="italic" opacity="0.6">centralized and never</text>
    <text x="205" y="333" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-style="italic" opacity="0.6">converges: not discussed here</text>

  </g>
</svg>
