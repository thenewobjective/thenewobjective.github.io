<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="auto" role="img" aria-labelledby="es-title es-desc">
  <title id="es-title">One authoritative event log, many different reconstructed states</title>
  <desc id="es-desc">An append-only sequence of events is the single authoritative history. Three separate services each replay that same log into a different local projection: a balance view, an audit view, and an analytics view.</desc>

  <defs>
    <marker id="es-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="white"/>
  <g fill="none" stroke="currentColor" font-family="sans-serif" color="#333">

    <!-- Event log -->
    <text x="300" y="30" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-style="italic">append-only event log (authoritative)</text>
    <g stroke-width="2">
      <rect x="40" y="45" width="70" height="40" rx="4"/>
      <rect x="130" y="45" width="70" height="40" rx="4"/>
      <rect x="220" y="45" width="70" height="40" rx="4"/>
      <rect x="310" y="45" width="70" height="40" rx="4"/>
      <rect x="400" y="45" width="70" height="40" rx="4"/>
    </g>
    <text x="75" y="70" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">E1</text>
    <text x="165" y="70" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">E2</text>
    <text x="255" y="70" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">E3</text>
    <text x="345" y="70" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">E4</text>
    <text x="435" y="70" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">E5</text>
    <line x1="110" y1="65" x2="130" y2="65" stroke-width="1.6" marker-end="url(#es-arrow)"/>
    <line x1="200" y1="65" x2="220" y2="65" stroke-width="1.6" marker-end="url(#es-arrow)"/>
    <line x1="290" y1="65" x2="310" y2="65" stroke-width="1.6" marker-end="url(#es-arrow)"/>
    <line x1="380" y1="65" x2="400" y2="65" stroke-width="1.6" marker-end="url(#es-arrow)"/>

    <!-- Projections -->
    <rect x="30" y="200" width="140" height="60" rx="8" stroke-width="2"/>
    <text x="100" y="225" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="bold">Service A</text>
    <text x="100" y="243" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" font-style="italic">balance view</text>

    <ellipse cx="300" cy="230" rx="80" ry="32" stroke-width="2"/>
    <text x="300" y="225" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="bold">Service B</text>
    <text x="300" y="243" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" font-style="italic">audit view</text>

    <polygon points="500,198 545,215 545,247 500,264 455,247 455,215" stroke-width="2"/>
    <text x="500" y="225" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="bold">Service C</text>
    <text x="500" y="243" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" font-style="italic">analytics view</text>

    <!-- Arrows from log to each projection -->
    <line x1="120" y1="90" x2="100" y2="196" stroke-width="1.6" marker-end="url(#es-arrow)"/>
    <line x1="300" y1="90" x2="300" y2="196" stroke-width="1.6" marker-end="url(#es-arrow)"/>
    <line x1="420" y1="90" x2="490" y2="192" stroke-width="1.6" marker-end="url(#es-arrow)"/>

    <text x="300" y="285" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" font-style="italic">each replays the same events into a different local shape</text>

  </g>
</svg>
