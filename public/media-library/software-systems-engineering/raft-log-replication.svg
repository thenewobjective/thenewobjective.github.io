<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 460" width="100%" height="auto" role="img" aria-labelledby="raft-title raft-desc">
  <title id="raft-title">A Raft cluster replicating one consistent log</title>
  <desc id="raft-desc">A leader node holds a log of entries and replicates it to three follower nodes. No individual node, not the leader, not the log, not the protocol, holds the concept of a single consistent history; it is the invariant the replication protocol instantiates across all of them.</desc>

  <defs>
    <marker id="raft-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>

  <g fill="none" stroke="currentColor" font-family="sans-serif" color="#333">

    <!-- Leader -->
    <rect x="220" y="30" width="180" height="90" rx="8" stroke-width="2.2"/>
    <text x="310" y="52" text-anchor="middle" fill="currentColor" stroke="none" font-size="13" font-weight="bold">Leader</text>
    <g stroke-width="1.4">
      <rect x="235" y="65" width="34" height="34" rx="3"/>
      <rect x="277" y="65" width="34" height="34" rx="3"/>
      <rect x="319" y="65" width="34" height="34" rx="3"/>
      <rect x="361" y="65" width="34" height="34" rx="3"/>
    </g>
    <text x="252" y="87" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" stroke-width="0">E1</text>
    <text x="294" y="87" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" stroke-width="0">E2</text>
    <text x="336" y="87" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" stroke-width="0">E3</text>
    <text x="378" y="87" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" stroke-width="0">E4</text>

    <!-- Followers -->
    <g>
      <rect x="30" y="290" width="160" height="90" rx="8" stroke-width="2"/>
      <text x="110" y="312" text-anchor="middle" fill="currentColor" stroke="none" font-size="13" font-weight="bold">Follower</text>
      <g stroke-width="1.2">
        <rect x="42" y="325" width="30" height="30" rx="3"/>
        <rect x="80" y="325" width="30" height="30" rx="3"/>
        <rect x="118" y="325" width="30" height="30" rx="3"/>
        <rect x="156" y="325" width="30" height="30" rx="3"/>
      </g>
      <text x="57" y="344" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E1</text>
      <text x="95" y="344" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E2</text>
      <text x="133" y="344" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E3</text>
      <text x="171" y="344" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E4</text>
    </g>

    <g>
      <rect x="230" y="330" width="160" height="90" rx="8" stroke-width="2"/>
      <text x="310" y="352" text-anchor="middle" fill="currentColor" stroke="none" font-size="13" font-weight="bold">Follower</text>
      <g stroke-width="1.2">
        <rect x="242" y="365" width="30" height="30" rx="3"/>
        <rect x="280" y="365" width="30" height="30" rx="3"/>
        <rect x="318" y="365" width="30" height="30" rx="3"/>
        <rect x="356" y="365" width="30" height="30" rx="3"/>
      </g>
      <text x="257" y="384" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E1</text>
      <text x="295" y="384" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E2</text>
      <text x="333" y="384" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E3</text>
      <text x="371" y="384" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E4</text>
    </g>

    <g>
      <rect x="430" y="290" width="160" height="90" rx="8" stroke-width="2"/>
      <text x="510" y="312" text-anchor="middle" fill="currentColor" stroke="none" font-size="13" font-weight="bold">Follower</text>
      <g stroke-width="1.2">
        <rect x="442" y="325" width="30" height="30" rx="3"/>
        <rect x="480" y="325" width="30" height="30" rx="3"/>
        <rect x="518" y="325" width="30" height="30" rx="3"/>
        <rect x="556" y="325" width="30" height="30" rx="3"/>
      </g>
      <text x="457" y="344" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E1</text>
      <text x="495" y="344" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E2</text>
      <text x="533" y="344" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E3</text>
      <text x="571" y="344" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" stroke-width="0">E4</text>
    </g>

    <!-- Replication arrows from leader to each follower -->
    <path d="M 250,120 C 190,190 140,240 115,288" stroke-width="1.8" marker-end="url(#raft-arrow)"/>
    <path d="M 310,120 C 310,190 310,250 310,328" stroke-width="1.8" marker-end="url(#raft-arrow)"/>
    <path d="M 370,120 C 430,190 480,240 505,288" stroke-width="1.8" marker-end="url(#raft-arrow)"/>

    <text x="310" y="150" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-style="italic">replicate log entries</text>

    <text x="310" y="440" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-style="italic">no single node holds "maintain one consistent history": it is what the protocol instantiates</text>

  </g>
</svg>
