<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="100%" height="auto" role="img" aria-labelledby="mech-title mech-desc">
  <title id="mech-title">Mechanism design: engineering incentives instead of commanding agents</title>
  <desc id="mech-desc">Three self-interested agents each pursue their own local reward. Their choices pass through a designed incentive structure, the rules of interaction, rather than being commanded directly. The result is a collective global outcome that no individual agent intended.</desc>

  <defs>
    <marker id="mech-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>

  <g font-family="sans-serif" color="#333">

    <!-- Agents -->
    <g fill="none" stroke="currentColor" stroke-width="2">
      <rect x="20" y="30" width="150" height="55" rx="8"/>
      <rect x="20" y="132" width="150" height="55" rx="8"/>
      <rect x="20" y="234" width="150" height="55" rx="8"/>
    </g>
    <text x="95" y="53" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="bold">Agent A</text>
    <text x="95" y="70" text-anchor="middle" fill="currentColor" stroke="none" font-size="11">maximize own reward</text>
    <text x="95" y="155" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="bold">Agent B</text>
    <text x="95" y="172" text-anchor="middle" fill="currentColor" stroke="none" font-size="11">maximize own reward</text>
    <text x="95" y="257" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="bold">Agent C</text>
    <text x="95" y="274" text-anchor="middle" fill="currentColor" stroke="none" font-size="11">maximize own reward</text>

    <!-- Arrows into incentive structure -->
    <line x1="170" y1="57" x2="238" y2="140" stroke="currentColor" stroke-width="1.8" marker-end="url(#mech-arrow)" fill="none"/>
    <line x1="170" y1="159" x2="238" y2="159" stroke="currentColor" stroke-width="1.8" marker-end="url(#mech-arrow)" fill="none"/>
    <line x1="170" y1="261" x2="238" y2="178" stroke="currentColor" stroke-width="1.8" marker-end="url(#mech-arrow)" fill="none"/>

    <!-- Incentive structure (designed) -->
    <rect x="240" y="110" width="160" height="100" rx="10" fill="#2e7d32" opacity="0.08" stroke="#2e7d32" stroke-width="2"/>
    <text x="320" y="140" text-anchor="middle" fill="#2e7d32" stroke="none" font-size="12" font-weight="bold">incentive structure</text>
    <text x="320" y="158" text-anchor="middle" fill="#2e7d32" stroke="none" font-size="12" font-weight="bold">(the rules of</text>
    <text x="320" y="176" text-anchor="middle" fill="#2e7d32" stroke="none" font-size="12" font-weight="bold">interaction, designed)</text>
    <text x="320" y="197" text-anchor="middle" fill="#2e7d32" stroke="none" font-size="10" font-style="italic">e.g. block reward</text>

    <!-- Arrow to outcome -->
    <line x1="400" y1="160" x2="465" y2="160" stroke="currentColor" stroke-width="2.2" marker-end="url(#mech-arrow)" fill="none"/>

    <!-- Global outcome -->
    <rect x="468" y="110" width="150" height="100" rx="10" fill="none" stroke="currentColor" stroke-width="2"/>
    <text x="543" y="150" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="bold">collective global</text>
    <text x="543" y="168" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="bold">outcome</text>
    <text x="543" y="188" text-anchor="middle" fill="currentColor" stroke="none" font-size="10" font-style="italic">e.g. chain security</text>

    <text x="320" y="300" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-style="italic">no agent is commanded; each pursues its own reward and the outcome follows</text>

  </g>
</svg>
