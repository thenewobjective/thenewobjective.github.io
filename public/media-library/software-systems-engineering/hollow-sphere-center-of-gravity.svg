<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 760" width="100%" height="auto" role="img" aria-labelledby="hs-title hs-desc">
  <title id="hs-title">Hollow sphere: the center of gravity governs motion without being occupied by any mass</title>
  <desc id="hs-desc">A hollow sphere with its mass distributed in the shell. Its center of gravity sits at the exact middle, where there is no mass at all, yet that point is what you must account for to control the sphere's motion.</desc>

  <g font-family="sans-serif" color="#333">

    <text x="390" y="55" text-anchor="middle" fill="currentColor" stroke="none" font-size="26" letter-spacing="2">HOLLOW SPHERE</text>

    <g fill="none" stroke="#777" stroke-width="3">
      <circle cx="390" cy="400" r="200"/>
    </g>

    <!-- Equator shading: back rim (hidden, dashed) and front rim (visible, solid) -->
    <ellipse cx="390" cy="355" rx="200" ry="58" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="6,5"/>
    <path d="M 190,400 A 200,58 0 0 0 590,400" fill="none" stroke="#999" stroke-width="1.5"/>

    <!-- Crosshair through the center -->
    <line x1="390" y1="200" x2="390" y2="600" stroke="#999" stroke-width="1" stroke-dasharray="2,4"/>
    <line x1="190" y1="400" x2="590" y2="400" stroke="#999" stroke-width="1" stroke-dasharray="2,4"/>
    <line x1="228" y1="562" x2="390" y2="400" stroke="#999" stroke-width="1" stroke-dasharray="2,4"/>

    <!-- The center of gravity: a point with no mass -->
    <circle cx="390" cy="400" r="6" fill="currentColor" stroke="none"/>

    <!-- Label: hollow sphere shell -->
    <text x="40" y="205" fill="currentColor" stroke="none" font-size="16">HOLLOW SPHERE</text>
    <text x="40" y="226" fill="currentColor" stroke="none" font-size="16">(mass distributed</text>
    <text x="40" y="247" fill="currentColor" stroke="none" font-size="16">in the shell)</text>
    <line x1="150" y1="252" x2="222" y2="272" stroke="#555" stroke-width="1"/>
    <circle cx="224" cy="274" r="3" fill="#555" stroke="none"/>

    <!-- Label: center of gravity -->
    <text x="610" y="330" fill="#1f4fd8" stroke="none" font-size="16" font-weight="bold">CENTER OF GRAVITY</text>
    <text x="610" y="351" fill="#1f4fd8" stroke="none" font-size="16">(No Mass)</text>
    <line x1="605" y1="325" x2="396" y2="402" stroke="#1f4fd8" stroke-width="1.5"/>

    <!-- Caption box -->
    <rect x="215" y="655" width="350" height="80" rx="6" fill="none" stroke="#1f4fd8" stroke-width="1.5"/>
    <circle cx="235" cy="683" r="3" fill="currentColor" stroke="none"/>
    <text x="248" y="688" fill="currentColor" stroke="none" font-size="15">A point that governs motion,</text>
    <text x="248" y="710" fill="currentColor" stroke="none" font-size="15">without being occupied by any mass.</text>

  </g>
</svg>
