<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="100%" height="auto" role="img" aria-labelledby="k8s-title k8s-desc">
  <title id="k8s-title">A Kubernetes reconciliation loop</title>
  <desc id="k8s-desc">A controller repeatedly observes the actual cluster state, compares it against the desired state stored in etcd, and acts to close the gap, then observes again, continuing indefinitely.</desc>

  <defs>
    <marker id="k8s-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="white"/>
  <g fill="none" stroke="currentColor" font-family="sans-serif" color="#333">

    <!-- Center: the governor -->
    <circle cx="210" cy="210" r="60" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="210" y="205" text-anchor="middle" fill="currentColor" stroke="none" font-size="13" font-weight="bold">desired state</text>
    <text x="210" y="222" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" font-style="italic">(etcd, the governor)</text>

    <!-- Three loop stages around the center -->
    <rect x="150" y="20" width="120" height="55" rx="8" stroke-width="2"/>
    <text x="210" y="43" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="bold">Observe</text>
    <text x="210" y="60" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" font-style="italic">actual cluster state</text>

    <rect x="20" y="290" width="130" height="60" rx="8" stroke-width="2"/>
    <text x="85" y="315" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="bold">Compare</text>
    <text x="85" y="333" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" font-style="italic">actual vs. desired</text>

    <rect x="270" y="290" width="130" height="60" rx="8" stroke-width="2"/>
    <text x="335" y="315" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="bold">Act</text>
    <text x="335" y="333" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" font-style="italic">adjust the cluster</text>

    <!-- Loop arrows connecting the three stages -->
    <path d="M 175,75 C 130,150 100,220 105,288" stroke-width="1.8" marker-end="url(#k8s-arrow)"/>
    <path d="M 150,325 C 200,340 250,340 268,328" stroke-width="1.8" marker-end="url(#k8s-arrow)"/>
    <path d="M 335,288 C 320,200 280,110 245,72" stroke-width="1.8" marker-end="url(#k8s-arrow)"/>

    <text x="200" y="390" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" font-style="italic">repeats indefinitely; the goal is never issued as a single imperative instruction</text>

  </g>
</svg>
