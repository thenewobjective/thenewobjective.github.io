<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="100%" height="auto" role="img" aria-labelledby="btc-title btc-desc">
  <title id="btc-title">The longest-chain rule resolving a fork with no administrator</title>
  <desc id="btc-desc">A shared chain of blocks forks when two miners each extend it independently. One branch is extended further by subsequent miners and becomes the canonical chain; the shorter branch is abandoned. No administrator decides this; every node independently follows whichever valid chain is longest.</desc>

  <defs>
    <marker id="btc-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>

  <g font-family="sans-serif" color="#333">

    <!-- Shared history -->
    <g fill="none" stroke="currentColor" stroke-width="2">
      <rect x="20" y="120" width="60" height="50" rx="6"/>
      <rect x="105" y="120" width="60" height="50" rx="6"/>
      <rect x="190" y="120" width="60" height="50" rx="6"/>
    </g>
    <text x="50" y="150" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">B1</text>
    <text x="135" y="150" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">B2</text>
    <text x="220" y="150" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">B3</text>
    <line x1="80" y1="145" x2="103" y2="145" stroke="currentColor" stroke-width="1.8" marker-end="url(#btc-arrow)" fill="none"/>
    <line x1="165" y1="145" x2="188" y2="145" stroke="currentColor" stroke-width="1.8" marker-end="url(#btc-arrow)" fill="none"/>

    <!-- Fork: winning branch (solid, longer) -->
    <g fill="none" stroke="currentColor" stroke-width="2">
      <rect x="290" y="60" width="60" height="50" rx="6"/>
      <rect x="375" y="60" width="60" height="50" rx="6"/>
      <rect x="460" y="60" width="60" height="50" rx="6"/>
      <rect x="545" y="60" width="60" height="50" rx="6"/>
    </g>
    <text x="320" y="90" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">B4</text>
    <text x="405" y="90" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">B5</text>
    <text x="490" y="90" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">B6</text>
    <text x="575" y="90" text-anchor="middle" fill="currentColor" stroke="none" font-size="12">B7</text>
    <line x1="250" y1="145" x2="288" y2="90" stroke="currentColor" stroke-width="1.8" marker-end="url(#btc-arrow)" fill="none"/>
    <line x1="350" y1="85" x2="373" y2="85" stroke="currentColor" stroke-width="1.8" marker-end="url(#btc-arrow)" fill="none"/>
    <line x1="435" y1="85" x2="458" y2="85" stroke="currentColor" stroke-width="1.8" marker-end="url(#btc-arrow)" fill="none"/>
    <line x1="520" y1="85" x2="543" y2="85" stroke="currentColor" stroke-width="1.8" marker-end="url(#btc-arrow)" fill="none"/>
    <text x="450" y="40" text-anchor="middle" fill="currentColor" stroke="none" font-size="13" font-weight="bold">longest valid chain: canonical</text>

    <!-- Fork: orphaned branch (dashed, shorter) -->
    <g fill="none" stroke="#999" stroke-width="1.6" stroke-dasharray="5,4">
      <rect x="290" y="200" width="60" height="50" rx="6"/>
    </g>
    <text x="320" y="230" text-anchor="middle" fill="#999" stroke="none" font-size="12">B4'</text>
    <line x1="250" y1="150" x2="288" y2="215" stroke="#999" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#btc-arrow)" fill="none"/>
    <text x="320" y="270" text-anchor="middle" fill="#999" stroke="none" font-size="12" font-style="italic">shorter branch: abandoned</text>

    <text x="320" y="298" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-style="italic">no administrator chooses; every node independently follows the longer chain</text>

  </g>
</svg>
